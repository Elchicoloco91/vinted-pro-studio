<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted Pro Studio - AI Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .vinted-gradient { background: linear-gradient(135deg, #00acc1 0%, #007c91 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 3s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                upload: <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />,
                zap: <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />,
                photo: <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V6.75z" />,
                check: <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
                copy: <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />,
                download: <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const apiKey = "AIzaSyBQ-PYHWi1lttYaLM7NsyTrq5acYiEsoac";
            const [originalImage, setOriginalImage] = useState(null);
            const [base64, setBase64] = useState(null);
            const [loading, setLoading] = useState(false);
            const [textLoading, setTextLoading] = useState(false);
            const [copied, setCopied] = useState(false);
            const [description, setDescription] = useState("");
            
            const [details, setDetails] = useState({
                brand: "Tommy Hilfiger",
                size: "",
                condition: "Ottime condizioni",
                material: "Cotone",
                color: ""
            });

            const [results, setResults] = useState({
                mannequin: null,
                model: null,
                hanger: null,
                shop: null
            });

            const fileInputRef = useRef(null);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setOriginalImage(event.target.result);
                        setBase64(event.target.result.split(',')[1]);
                        // Reset risultati
                        setResults({ mannequin: null, model: null, hanger: null, shop: null });
                        setDescription("");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const generateImage = async (prompt) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `PRESERVE AUTHENTICITY: Keep the clothing item exactly as shown in the original photo. Do not change colors, logos, or texture. Place it in this setting: ${prompt}` },
                                { inlineData: { mimeType: "image/png", data: base64 } }
                            ]
                        }],
                        generationConfig: { responseModalities: ['IMAGE'] }
                    })
                });
                const data = await response.json();
                const part = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                return part ? `data:${part.inlineData.mimeType};base64,${part.inlineData.data}` : null;
            };

            const generateAllImages = async () => {
                if (!base64) return;
                setLoading(true);
                try {
                    const prompts = {
                        mannequin: "On a professional male mannequin, clean white studio background, studio lighting.",
                        model: "Worn by a stylish male model walking in a sunlit urban street, natural fit.",
                        hanger: "Hanging on a premium wooden hanger against a minimalist light grey wall.",
                        shop: "Displayed beautifully inside a high-end clothing boutique with warm spotlighting."
                    };

                    for (const [key, prompt] of Object.entries(prompts)) {
                        const img = await generateImage(prompt);
                        setResults(prev => ({ ...prev, [key]: img }));
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            const generateDescription = async () => {
                if (!base64) return;
                setTextLoading(true);
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    const prompt = `Agisci come un venditore privato onesto su Vinted Italia. 
                    Scrivi una descrizione amichevole per questo capo: Brand ${details.brand}, Taglia ${details.size}, Condizioni ${details.condition}, Materiale ${details.material}, Colore ${details.color}.
                    Usa un tono come "vendo per inutilizzo", "tenuto con cura". Sii sincero e usa qualche emoji.`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: "image/png", data: base64 } }
                                ]
                            }]
                        })
                    });
                    const data = await response.json();
                    setDescription(data?.candidates?.[0]?.content?.parts?.[0]?.text || "");
                } catch (e) {
                    console.error(e);
                } finally {
                    setTextLoading(false);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(description);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="text-center mb-12">
                        <div className="inline-block p-3 rounded-2xl vinted-gradient text-white mb-4 shadow-lg">
                            <Icon name="zap" className="w-8 h-8" />
                        </div>
                        <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight">Vinted <span className="text-[#00acc1]">Pro</span> Studio</h1>
                        <p className="text-slate-500 font-medium mt-2">Trasforma le tue foto in vendite lampo</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Colonna Sinistra: Input */}
                        <div className="lg:col-span-4 space-y-6">
                            <div 
                                onClick={() => fileInputRef.current.click()}
                                className={`aspect-square rounded-[2.5rem] border-4 border-dashed flex flex-col items-center justify-center p-4 transition-all cursor-pointer overflow-hidden
                                ${originalImage ? 'border-[#00acc1] bg-cyan-50' : 'border-slate-200 hover:border-cyan-300'}`}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleUpload} />
                                {originalImage ? (
                                    <img src={originalImage} className="w-full h-full object-cover rounded-2xl" alt="Preview" />
                                ) : (
                                    <div className="text-center">
                                        <div className="bg-white p-4 rounded-full shadow-sm mb-4 inline-block text-slate-400">
                                            <Icon name="upload" className="w-8 h-8" />
                                        </div>
                                        <p className="font-bold text-slate-700">Carica foto del capo</p>
                                        <p className="text-xs text-slate-400 mt-1">Clicca per selezionare</p>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-6 rounded-[2rem] card-shadow space-y-4">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="copy" className="w-5 h-5 text-[#00acc1]" /> Dettagli Capo
                                </h3>
                                <input 
                                    type="text" placeholder="Brand" 
                                    className="w-full px-4 py-3 rounded-xl bg-slate-50 border border-transparent focus:border-[#00acc1] outline-none text-sm"
                                    value={details.brand} onChange={e => setDetails({...details, brand: e.target.value})}
                                />
                                <div className="grid grid-cols-2 gap-3">
                                    <input 
                                        type="text" placeholder="Taglia" 
                                        className="w-full px-4 py-3 rounded-xl bg-slate-50 border border-transparent focus:border-[#00acc1] outline-none text-sm"
                                        value={details.size} onChange={e => setDetails({...details, size: e.target.value})}
                                    />
                                    <input 
                                        type="text" placeholder="Colore" 
                                        className="w-full px-4 py-3 rounded-xl bg-slate-50 border border-transparent focus:border-[#00acc1] outline-none text-sm"
                                        value={details.color} onChange={e => setDetails({...details, color: e.target.value})}
                                    />
                                </div>
                                <select 
                                    className="w-full px-4 py-3 rounded-xl bg-slate-50 border border-transparent focus:border-[#00acc1] outline-none text-sm appearance-none"
                                    value={details.condition} onChange={e => setDetails({...details, condition: e.target.value})}
                                >
                                    <option>Nuovo con cartellino</option>
                                    <option>Ottime condizioni</option>
                                    <option>Buone condizioni</option>
                                </select>
                                
                                <button 
                                    onClick={generateDescription}
                                    disabled={!originalImage || textLoading}
                                    className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {textLoading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <Icon name="zap" />} Genera Descrizione
                                </button>
                                
                                <button 
                                    onClick={generateAllImages}
                                    disabled={!originalImage || loading}
                                    className="w-full py-4 vinted-gradient text-white rounded-2xl font-extrabold text-lg shadow-lg shadow-cyan-200 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {loading ? <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin" /> : "Ottimizza 4 Foto"}
                                </button>
                            </div>
                        </div>

                        {/* Colonna Destra: Risultati */}
                        <div className="lg:col-span-8 space-y-6">
                            {description && (
                                <div className="bg-white p-6 rounded-[2rem] card-shadow border border-cyan-50 relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-xs font-bold uppercase tracking-widest text-[#00acc1]">Descrizione Suggerita</span>
                                        <button onClick={copyToClipboard} className={`p-2 rounded-lg flex items-center gap-2 text-xs font-bold transition-all ${copied ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                            <Icon name={copied ? 'check' : 'copy'} className="w-4 h-4" /> {copied ? 'Copiato!' : 'Copia'}
                                        </button>
                                    </div>
                                    <div className="text-slate-600 text-sm italic whitespace-pre-wrap leading-relaxed">{description}</div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <ResultCard title="Su Manichino" image={results.mannequin} />
                                <ResultCard title="Indossata (Modello)" image={results.model} />
                                <ResultCard title="Aesthetic (Stampella)" image={results.hanger} />
                                <ResultCard title="Esposizione Negozio" image={results.shop} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultCard = ({ title, image }) => (
            <div className="bg-white p-4 rounded-[2rem] card-shadow group">
                <div className="flex justify-between items-center mb-3">
                    <h4 className="font-bold text-slate-800 text-sm">{title}</h4>
                    {image && <a href={image} download={`vinted-${title}.png`} className="text-[#00acc1] hover:scale-110 transition-transform"><Icon name="download" className="w-5 h-5" /></a>}
                </div>
                <div className="aspect-[4/5] bg-slate-50 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-100">
                    {image ? (
                        <img src={image} className="w-full h-full object-cover" />
                    ) : (
                        <div className="text-slate-200 flex flex-col items-center">
                            <Icon name="photo" className="w-12 h-12 mb-2" />
                            <span className="text-[10px] uppercase font-bold tracking-widest">In attesa</span>
                        </div>
                    )}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
