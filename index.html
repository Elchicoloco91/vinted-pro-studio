<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted Pro Studio - AI Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .vinted-gradient { background: linear-gradient(135deg, #00acc1 0%, #007c91 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                upload: <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />,
                zap: <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />,
                photo: <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V6.75z" />,
                download: <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />,
                error: <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008h-.008v-.008z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const apiKey = "AIzaSyBQ-PYHWi1lttYaLM7NsyTrq5acYiEsoac";
            const [originalImage, setOriginalImage] = useState(null);
            const [base64, setBase64] = useState(null);
            const [loading, setLoading] = useState(false);
            const [textLoading, setTextLoading] = useState(false);
            const [copied, setCopied] = useState(false);
            const [description, setDescription] = useState("");
            const [errorMessage, setErrorMessage] = useState("");
            
            const [details, setDetails] = useState({
                brand: "Tommy Hilfiger",
                size: "",
                condition: "Ottime condizioni",
                material: "Cotone",
                color: ""
            });

            const [results, setResults] = useState({
                mannequin: null, model: null, hanger: null, shop: null
            });

            const fileInputRef = useRef(null);

            // Funzione di fetch con Backoff Esponenziale (5 tentativi)
            const fetchWithRetry = async (url, options, maxRetries = 5) => {
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (response.ok) return await response.json();
                        if (response.status === 429 || response.status >= 500) {
                            const delay = Math.pow(2, i) * 1000;
                            await new Promise(res => setTimeout(res, delay));
                        } else {
                            const errorData = await response.json();
                            throw new Error(errorData.error?.message || "Errore API sconosciuto");
                        }
                    } catch (err) {
                        if (i === maxRetries - 1) throw err;
                    }
                }
            };

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setOriginalImage(event.target.result);
                        setBase64(event.target.result.split(',')[1]);
                        setResults({ mannequin: null, model: null, hanger: null, shop: null });
                        setDescription("");
                        setErrorMessage("");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const generateSingleImage = async (prompt) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{
                        parts: [
                            { text: `TRASFORMAZIONE FOTO VINTED. Mantieni il capo di abbigliamento esattamente com'è nei colori e nella trama. Ambientalo qui: ${prompt}. Rendi la foto luminosa e professionale.` },
                            { inlineData: { mimeType: "image/png", data: base64 } }
                        ]
                    }],
                    generationConfig: { responseModalities: ['IMAGE'] }
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const base64Image = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                return base64Image ? `data:image/png;base64,${base64Image}` : null;
            };

            const generateAllImages = async () => {
                if (!base64) return;
                setLoading(true);
                setErrorMessage("");
                const prompts = {
                    mannequin: "Su un manichino maschile professionale, sfondo bianco pulito da studio.",
                    model: "Indossato da un modello che cammina in una strada cittadina moderna con luce solare.",
                    hanger: "Appeso a una stampella in legno contro una parete minimalista grigio chiaro.",
                    shop: "Esposto all'interno di una boutique di lusso con luci calde soffuse."
                };

                try {
                    for (const [key, prompt] of Object.entries(prompts)) {
                        const img = await generateSingleImage(prompt);
                        setResults(prev => ({ ...prev, [key]: img }));
                    }
                } catch (err) {
                    setErrorMessage("Errore generazione immagini: " + err.message);
                }
                setLoading(false);
            };

            const generateDescription = async () => {
                if (!base64) return;
                setTextLoading(true);
                setErrorMessage("");
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const promptText = `Analizza la foto e scrivi una descrizione per Vinted in italiano. Sii onesto, dì che sei un privato e che vendi perché non lo usi più. Includi questi dati: Brand ${details.brand}, Taglia ${details.size}, Condizioni ${details.condition}, Materiale ${details.material}, Colore ${details.color}. Usa emoji e un tono cordiale.`;

                try {
                    const data = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/png", data: base64 } }] }]
                        })
                    });
                    setDescription(data.candidates?.[0]?.content?.parts?.[0]?.text || "Nessuna descrizione generata.");
                } catch (err) {
                    setErrorMessage("Errore descrizione: " + err.message);
                }
                setTextLoading(false);
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = description;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="text-center mb-10">
                        <h1 className="text-4xl font-extrabold text-slate-800">Vinted <span className="text-[#00acc1]">Pro</span> Studio</h1>
                        <p className="text-slate-500 mt-2">Vendi i tuoi vestiti più velocemente con l'AI</p>
                    </header>

                    {errorMessage && (
                        <div className="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl flex items-center gap-3">
                            <Icon name="error" />
                            <span className="text-sm font-medium">{errorMessage}</span>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <div className="lg:col-span-4 space-y-6">
                            <div 
                                onClick={() => fileInputRef.current.click()} 
                                className={`aspect-square rounded-[2.5rem] border-4 border-dashed transition-all duration-300 flex items-center justify-center cursor-pointer overflow-hidden bg-white ${originalImage ? 'border-[#00acc1]' : 'border-slate-200 hover:border-slate-300'}`}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                {originalImage ? (
                                    <img src={originalImage} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="text-center">
                                        <Icon name="upload" className="w-12 h-12 text-slate-300 mx-auto mb-2" />
                                        <span className="text-slate-400 font-semibold">Carica foto originale</span>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] card-shadow space-y-4">
                                <h3 className="font-bold text-slate-800 border-b pb-2">Dettagli Capo</h3>
                                <div className="space-y-3">
                                    <label className="block">
                                        <span className="text-xs font-bold text-slate-400 ml-1">BRAND</span>
                                        <input type="text" className="w-full p-3 rounded-xl bg-slate-50 border-none outline-none text-sm mt-1 focus:ring-2 focus:ring-[#00acc1]" value={details.brand} onChange={e => setDetails({...details, brand: e.target.value})} />
                                    </label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <label>
                                            <span className="text-xs font-bold text-slate-400 ml-1">TAGLIA</span>
                                            <input type="text" className="w-full p-3 rounded-xl bg-slate-50 border-none outline-none text-sm mt-1 focus:ring-2 focus:ring-[#00acc1]" value={details.size} onChange={e => setDetails({...details, size: e.target.value})} />
                                        </label>
                                        <label>
                                            <span className="text-xs font-bold text-slate-400 ml-1">COLORE</span>
                                            <input type="text" className="w-full p-3 rounded-xl bg-slate-50 border-none outline-none text-sm mt-1 focus:ring-2 focus:ring-[#00acc1]" value={details.color} onChange={e => setDetails({...details, color: e.target.value})} />
                                        </label>
                                    </div>
                                    <label className="block">
                                        <span className="text-xs font-bold text-slate-400 ml-1">CONDIZIONI</span>
                                        <select className="w-full p-3 rounded-xl bg-slate-50 border-none outline-none text-sm mt-1" value={details.condition} onChange={e => setDetails({...details, condition: e.target.value})}>
                                            <option>Nuovo con cartellino</option>
                                            <option>Nuovo senza cartellino</option>
                                            <option>Ottime condizioni</option>
                                            <option>Buone condizioni</option>
                                        </select>
                                    </label>
                                </div>
                                
                                <div className="pt-4 space-y-3">
                                    <button 
                                        onClick={generateDescription} 
                                        disabled={!originalImage || textLoading} 
                                        className="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold text-sm transition-all disabled:opacity-50"
                                    >
                                        {textLoading ? "Generazione testo..." : "Genera Descrizione"}
                                    </button>
                                    <button 
                                        onClick={generateAllImages} 
                                        disabled={!originalImage || loading} 
                                        className="w-full py-4 vinted-gradient text-white rounded-2xl font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50"
                                    >
                                        {loading ? "AI sta lavorando..." : "Ottimizza 4 Foto"}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Results Area */}
                        <div className="lg:col-span-8 space-y-6">
                            {description && (
                                <div className="bg-white p-6 rounded-[2.5rem] card-shadow border-l-4 border-[#00acc1]">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-xs font-extrabold text-[#00acc1] tracking-tighter">DESCRIZIONE VINTED</span>
                                        <button 
                                            onClick={copyToClipboard}
                                            className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold transition-all ${copied ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        >
                                            <Icon name={copied ? 'check' : 'copy'} className="w-3 h-3" />
                                            {copied ? 'COPIATO' : 'COPIA TESTO'}
                                        </button>
                                    </div>
                                    <div className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap font-medium">
                                        {description}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <ResultCard title="Su Manichino" image={results.mannequin} isLoading={loading && !results.mannequin} />
                                <ResultCard title="Su Modello" image={results.model} isLoading={loading && !results.model} />
                                <ResultCard title="Su Stampella" image={results.hanger} isLoading={loading && !results.hanger} />
                                <ResultCard title="In Boutique" image={results.shop} isLoading={loading && !results.shop} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultCard = ({ title, image, isLoading }) => (
            <div className="bg-white p-4 rounded-[2rem] card-shadow transition-all hover:translate-y-[-4px]">
                <div className="flex justify-between items-center mb-3 px-2">
                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">{title}</span>
                    {image && (
                        <a href={image} download={`vinted-${title.toLowerCase()}.png`} className="text-[#00acc1] hover:scale-110 transition-transform">
                            <Icon name="download" className="w-5 h-5" />
                        </a>
                    )}
                </div>
                <div className={`aspect-[4/5] rounded-2xl overflow-hidden flex items-center justify-center bg-slate-50 relative ${isLoading ? 'animate-pulse-soft' : ''}`}>
                    {image ? (
                        <img src={image} className="w-full h-full object-cover" />
                    ) : (
                        <div className="text-center p-6">
                            <Icon name="photo" className={`w-10 h-10 mx-auto mb-2 ${isLoading ? 'text-[#00acc1]' : 'text-slate-200'}`} />
                            <p className="text-[10px] font-bold text-slate-300 uppercase">
                                {isLoading ? "Generazione in corso..." : "In attesa"}
                            </p>
                        </div>
                    )}
                </div>
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
